name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download resources
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10

      - name: Start playit
        id: playit
        run: |
          echo "========== FIVEM TUNNEL SETUP =========="
          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            echo "Using saved playit secret"
            playit --secret "${{ secrets.PLAYIT_SECRET }}" > playit.log 2>&1 &
            sleep 20
            echo "Tunnel address:"
            grep -i "dns\|tunnel\|address\|assigned" playit.log 2>/dev/null || tail -10 playit.log
          else
            echo "Starting playit fresh (no secret saved)"
            echo ""
            echo "CLAIM URL WILL APPEAR BELOW:"
            echo "----------------------------------------"
            playit > playit.log 2>&1 &
            sleep 25
            cat playit.log
            echo "========================================"
            CLAIM=$(grep -oP 'https?://[^\s"'"'"']*claim[^\s"'"'"']*' playit.log | head -1)
            if [ -z "$CLAIM" ]; then
              CLAIM=$(grep -oP 'https?://playit\.gg[^\s"'"'"']*' playit.log | head -1)
            fi
            if [ -z "$CLAIM" ]; then
              CLAIM=$(grep -oP 'https?://[^\s"'"'"']*' playit.log | grep -i "claim\|agent\|tunnel" | head -1)
            fi
            if [ -n "$CLAIM" ]; then
              echo ""
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "!!  CLAIM YOUR AGENT:"
              echo "!!  $CLAIM"
              echo "!!"
              echo "!!  OPEN THIS URL IN YOUR BROWSER"
              echo "!!  After claiming, the tunnel will work"
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "claim_url=$CLAIM" >> $GITHUB_OUTPUT
            fi
            echo ""
            echo "Full playit log above"
          fi
          echo "========== SETUP COMPLETE =========="
