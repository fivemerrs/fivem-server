name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download resources
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 32
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10
          echo "::notice::FXServer started (PID: $(pgrep -f FXServer))"

      - name: Run server + tunnel (all output here)
        run: |
          echo "::group::Starting playit tunnel"

          # If we have a saved secret, use it
          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            echo "Using saved playit secret"
            playit --secret "${{ secrets.PLAYIT_SECRET }}" > playit.log 2>&1 &
            sleep 20
            echo "::notice::TUNNEL ADDRESS:"
            grep -i "address\|tunnel\|listen\|domain" playit.log || echo "no tunnel yet"
          else
            echo "No saved secret - starting fresh"
            playit > playit.log 2>&1 &
            sleep 20
            CLAIM_URL=$(grep -oP 'https?://playit\.gg[^\s"'\'']*' playit.log | head -1)
            if [ -z "$CLAIM_URL" ]; then
              CLAIM_URL=$(grep -oP 'https?://[^\s"'\'']*claim[^\s"'\'']*' playit.log | head -1)
            fi
            if [ -n "$CLAIM_URL" ]; then
              echo "::notice title=CLAIM YOUR AGENT::$CLAIM_URL"
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "!!  OPEN THIS URL IN YOUR BROWSER TO CLAIM:"
              echo "!!  $CLAIM_URL"
              echo "!!  After claiming, the tunnel address appears here."
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
            else
              echo "Full playit output:"
              cat playit.log
            fi
          fi

          echo "::endgroup::"

          echo "::group::Keeping server alive - checking every 30s"
          echo "Server is running. Check this log for tunnel address."
          echo "The claim URL (if needed) is in the step above."
          echo "Once claimed, the tunnel address will appear in this log."

          # Keep alive - also re-check for tunnel info periodically
          for i in $(seq 1 720); do
            if ! pgrep -f FXServer > /dev/null 2>&1; then
              echo "FXServer died - restarting"
              cd fxserver
              nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
              cd ..
            fi
            if ! pgrep playit > /dev/null 2>&1; then
              echo "playit died - restarting"
              if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
                playit --secret "${{ secrets.PLAYIT_SECRET }}" >> playit.log 2>&1 &
              else
                playit >> playit.log 2>&1 &
              fi
              sleep 15
            fi
            # Every 30s show tunnel info
            echo "[$(date '+%H:%M:%S')] Check: server=up tunnel=up"
            grep -i "address\|tunnel\|listen\|domain\|ASSIGNED_PORT" playit.log 2>/dev/null | tail -3
            echo "---"
            sleep 30
          done
          echo "::endgroup::"
