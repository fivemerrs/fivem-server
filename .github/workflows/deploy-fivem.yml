name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download FXServer
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver server-data/resources
          tar -xf fx.tar.xz -C fxserver
          unzip -qo resources.zip -d server-data/resources/

      - name: Install Portwarp CLI
        run: curl -fsSL https://portwarp.com/download/install.sh | bash

      - name: Tunnel setup
        id: tunnel
        env:
          PORTWARP_API_KEY: ${{ secrets.PORTWARP_API_KEY }}
          PORTWARP_CREDENTIALS: ${{ secrets.PORTWARP_CREDENTIALS }}
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
          PLAYIT_EMAIL: ${{ secrets.PLAYIT_EMAIL }}
          PLAYIT_PASSWORD: ${{ secrets.PLAYIT_PASSWORD }}
          LOCAL_PORT: "30120"
        run: |
          chmod +x scripts/tunnel-setup.sh scripts/playit-setup.sh
          scripts/tunnel-setup.sh | tee tunnel.log

      - name: Write server config
        env:
          CONNECT_ADDR: ${{ steps.tunnel.outputs.connect_address }}
          CONNECT_HOST: ${{ steps.tunnel.outputs.connect_host }}
        run: |
          cat > server-data/server.cfg << CFG
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "FiveM Test Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          sv_listingHostOverride "${CONNECT_HOST}"
          sv_listingIPOverride "${CONNECT_ADDR}"
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          CFG
          cat server-data/server.cfg

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          for i in $(seq 1 120); do
            sleep 3
            if curl -sf http://localhost:30120/info.json >/dev/null 2>&1; then
              echo "FXServer ready"
              curl -s http://localhost:30120/info.json | head -c 300
              exit 0
            fi
          done
          echo "FXServer slow — continuing anyway, last logs:"
          tail -n 30 ../fivem.log || true

      - name: Print connect info
        run: |
          echo "############################################"
          echo "#  connect ${{ steps.tunnel.outputs.connect_address }}"
          echo "#  backend: ${{ steps.tunnel.outputs.tunnel_backend }}"
          echo "############################################"

      - name: Keep tunnel + server alive
        env:
          PORTWARP_CREDENTIALS: ${{ secrets.PORTWARP_CREDENTIALS }}
          TUNNEL_ID: ${{ steps.tunnel.outputs.tunnel_id }}
          TUNNEL_BACKEND: ${{ steps.tunnel.outputs.tunnel_backend }}
        run: |
          tail -f fivem.log &
          if [ "$TUNNEL_BACKEND" = "portwarp" ] && [ -n "$TUNNEL_ID" ]; then
            chmod +x scripts/portwarp-keepalive.sh
            scripts/portwarp-keepalive.sh "$TUNNEL_ID"
          else
            echo "playit agent running — keeping job alive"
            tail -f /dev/null
          fi
