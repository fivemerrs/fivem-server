name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download FXServer
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver server-data/resources
          tar -xf fx.tar.xz -C fxserver
          unzip -qo resources.zip -d server-data/resources/

      - name: Localtonet TCP+UDP tunnel
        id: tunnel
        env:
          LOCALTONET_AUTHTOKEN: ${{ secrets.LOCALTONET_AUTHTOKEN }}
          LOCALTONET_CONNECT: ${{ secrets.LOCALTONET_CONNECT }}
          LOCAL_PORT: "30120"
        run: |
          chmod +x scripts/localtonet-setup.sh scripts/localtonet-keepalive.sh
          scripts/localtonet-setup.sh
          test -s connect.txt
          echo "tunnel output connect=$(cat connect.txt)"

      - name: Write server config
        env:
          CONNECT_ADDR: ${{ steps.tunnel.outputs.connect_address }}
          CONNECT_HOST: ${{ steps.tunnel.outputs.connect_host }}
        run: |
          cat > server-data/server.cfg << CFG
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "FiveM Test Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          sv_listingHostOverride "${CONNECT_HOST}"
          sv_listingIPOverride "${CONNECT_ADDR}"
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          CFG

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          for i in $(seq 1 120); do
            sleep 3
            if curl -sf http://127.0.0.1:30120/info.json >/dev/null 2>&1; then
              echo "FXServer ready"
              curl -s http://127.0.0.1:30120/info.json | head -c 400 || true
              echo
              exit 0
            fi
          done
          echo "FXServer slow — continuing"
          tail -n 40 ../fivem.log || true

      - name: Verify local then public path
        env:
          CONNECT_ADDR: ${{ steps.tunnel.outputs.connect_address }}
        run: |
          echo "=== local info.json ==="
          curl -sv --max-time 10 http://127.0.0.1:30120/info.json 2>&1 | tail -n 30 || true
          echo "=== public http://$CONNECT_ADDR/info.json ==="
          curl -sv --max-time 15 "http://${CONNECT_ADDR}/info.json" 2>&1 | tail -n 40 || true
          echo "=== localtonet agent ==="
          pgrep -a localtonet || true
          tail -n 50 localtonet-agent.log || true

      - name: Print connect info
        run: |
          echo "############################################"
          echo "#  connect ${{ steps.tunnel.outputs.connect_address }}"
          echo "#  backend: localtonet TCP+UDP mixed"
          echo "############################################"
          echo "${{ steps.tunnel.outputs.connect_address }}" > connect.txt
          echo "## Connect" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "connect ${{ steps.tunnel.outputs.connect_address }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "After agent online: Stop+Start the UDP/TCP tunnel in Localtonet dashboard." >> $GITHUB_STEP_SUMMARY

      - name: Upload connect address
        uses: actions/upload-artifact@v4
        with:
          name: connect-address
          path: |
            connect.txt
            localtonet-agent.log
          retention-days: 1
          if-no-files-found: warn

      - name: Keep tunnel + server alive
        env:
          LOCALTONET_AUTHTOKEN: ${{ secrets.LOCALTONET_AUTHTOKEN }}
        run: |
          chmod +x scripts/localtonet-keepalive.sh
          scripts/localtonet-keepalive.sh
