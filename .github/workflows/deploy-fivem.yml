name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download resources
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install and setup playit
        id: playit
        run: |
          # Install playit
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y

          # Stop the auto-started systemd service
          sudo systemctl stop playit.service 2>/dev/null || true
          sudo systemctl disable playit.service 2>/dev/null || true

          # Start FXServer in background
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10
          cd ..

          echo "========== FIVEM TUNNEL SETUP =========="

          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            echo "Using saved playit secret"
            playit -s "${{ secrets.PLAYIT_SECRET }}" > playit.log 2>&1 &
            sleep 20
            echo "Tunnel address:"
            grep -i "dns\|tunnel\|address\|assigned\|domain" playit.log | head -5
          else
            echo "Starting playit fresh (no secret saved)"
            echo ""
            echo "CLAIM URL WILL APPEAR BELOW:"
            echo "----------------------------------------"
            playit > playit.log 2>&1 &
            sleep 30
            cat playit.log
            echo "========================================"
            echo ""
            echo "--- Looking for claim URL ---"
            grep -i "claim\|playit.gg\|http" playit.log | head -10
            CLAIM=$(grep -oP 'https?://[^\s"'"'"']*' playit.log | grep -i "claim" | head -1)
            if [ -z "$CLAIM" ]; then
              CLAIM=$(grep -oP 'https?://playit\.gg[^\s"'"'"']*' playit.log | head -1)
            fi
            if [ -n "$CLAIM" ]; then
              echo ""
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "!!  CLAIM URL: $CLAIM"
              echo "!!  Open it in your browser to link the tunnel"
              echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "claim_url=$CLAIM" >> $GITHUB_OUTPUT
            fi
          fi

          echo "========== SETUP COMPLETE =========="

      - name: Show logs
        if: always()
        run: |
          echo "=== Full playit.log ==="
          cat playit.log 2>/dev/null || echo "no playit.log"
          echo ""
          echo "=== Fivem.log (last 20) ==="
          tail -20 fivem.log 2>/dev/null || echo "no fivem.log"
