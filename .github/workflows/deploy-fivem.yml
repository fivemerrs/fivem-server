name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Config
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10

      - name: Setup playit tunnel
        id: tunnel
        run: |
          # Install (daemon auto-starts)
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y
          sleep 5

          # Add runner to playit group so CLI can talk to daemon
          sudo usermod -aG playit $USER

          echo "========== PLAYIT SETUP =========="

          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            echo "Using saved playit secret..."
            echo "${{ secrets.PLAYIT_SECRET }}" | sg playit -c "playit setup" 2>&1 || true
            sleep 10
            sg playit -c "playit show-tunnel" 2>&1 || echo "tunnel not ready yet"
          else
            echo "Running playit setup to get claim URL..."
            # Non-interactive setup - the claim URL should appear here
            sg playit -c "playit setup" 2>&1
            sleep 5
            echo "========== DAEMON LOG =========="
            cat /var/log/playit/playit.log 2>/dev/null || echo "no log file"
            echo ""
            echo "========== LOOKING FOR CLAIM =========="
            sg playit -c "playit setup" 2>&1 | head -20
          fi

          echo "========== DONE =========="
