name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download resources
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 32
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10
          echo "FXServer PID: $(pgrep -f FXServer)"

      - name: Start playit and get claim URL
        run: |
          # If we already have a saved secret, use it
          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            echo "Using saved playit secret"
            playit --secret "${{ secrets.PLAYIT_SECRET }}" > playit.log 2>&1 &
            sleep 15
            echo "=== TUNNEL INFO ==="
            grep -i "address\|tunnel\|listen" playit.log || true
            echo "=== (tunnel address above) ==="
          else
            echo "No saved secret â€” starting playit to get claim URL"
            playit > playit.log 2>&1 &
            sleep 15
            echo ""
            echo "============================================"
            echo "  CLAIM URL (open in browser):"
            grep -oP 'https?://playit\.gg[^ ]+' playit.log | head -5 || echo "    (not found yet, checking again...)"
            grep -oP 'https?://[^ ]*claim[^ ]*' playit.log | head -5 || true
            grep -oP 'https?://[^ ]*' playit.log | grep -v localhost | head -5 || true
            echo ""
            echo "  FULL PLAYIT OUTPUT:"
            cat playit.log
            echo ""
            echo "  After claiming, the tunnel address will appear here."
            echo "  Check this log again in 1-2 minutes."
            echo "============================================"
            # Wait and check for secret
            sleep 60
            if [ -f ~/.config/playit/playit.toml ]; then
              echo "=== PLAYIT CONFIG (SECRET FOUND) ==="
              cat ~/.config/playit/playit.toml
            fi
            echo ""
            echo "=== TUNNEL INFO (after 60s) ==="
            grep -i "address\|tunnel\|listen\|domain" playit.log || echo "No tunnel yet â€” claim the URL above first"
          fi

      - name: Keep alive (check tunnel periodically)
        run: |
          for i in $(seq 1 720); do
            echo "[${i}x10s] Checking..."
            if ! pgrep -f FXServer > /dev/null 2>&1; then
              echo "FXServer died â€” restarting"
              cd fxserver
              nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
              cd ..
            fi
            if ! pgrep playit > /dev/null 2>&1; then
              echo "playit died â€” restarting"
              if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
                playit --secret "${{ secrets.PLAYIT_SECRET }}" >> playit.log 2>&1 &
              else
                playit >> playit.log 2>&1 &
              fi
            fi
            sleep 10
          done
