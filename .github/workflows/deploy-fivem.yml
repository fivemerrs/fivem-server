name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download FXServer
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Config
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          echo "Waiting for FXServer..."
          for i in $(seq 1 15); do
            sleep 1
            if curl -s http://localhost:30120/info.json > /dev/null 2>&1; then
              echo "FXServer is ready!"
              break
            fi
          done
          echo "=== FXServer log ==="
          tail -10 ../fivem.log 2>/dev/null || echo "No log yet"

      - name: Playit tunnel
        run: |
          SECRET="${{ secrets.PLAYIT_SECRET }}"
          echo "Starting playit tunnel with Docker..."
          docker run -d --name playit --rm --net=host \
            -e SECRET_KEY="$SECRET" \
            ghcr.io/playit-cloud/playit-agent:0.17 2>&1
            
          sleep 5
          echo "=== Container status ==="
          docker ps -a --filter name=playit
          
          echo "=== Waiting for tunnel to establish ==="
          for i in $(seq 1 30); do
            sleep 5
            echo "--- check $i ---"
            docker logs playit --tail 10 2>/dev/null || echo "Container not running"
            echo ""
          done
