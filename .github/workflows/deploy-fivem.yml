name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install MariaDB + tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mariadb-server unzip curl screen python3
          sudo service mariadb start
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS es_extended CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'fivem'@'localhost' IDENTIFIED BY 'fivem';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON es_extended.* TO 'fivem'@'localhost'; FLUSH PRIVILEGES;"
          echo "MariaDB ready"

      - name: Download FXServer + freeroam stack
        run: |
          chmod +x scripts/freeroam-install.sh
          scripts/freeroam-install.sh

      - name: Import SQL
        run: |
          SQL_DIR="server-data/sql"
          if [ -f "$SQL_DIR/legacy.sql" ]; then
            sudo mysql es_extended < "$SQL_DIR/legacy.sql"
            echo "imported legacy.sql"
          else
            # fallback: import per-resource SQL from es_extended
            find server-data/resources -name '*.sql' | while read -r f; do
              echo "import $f"
              sudo mysql es_extended < "$f" || true
            done
          fi
          # identity/skin extras if not in legacy
          for f in \
            server-data/resources/\[core\]/esx_identity/esx_identity.sql \
            server-data/resources/\[core\]/esx_skin/esx_skin.sql
          do
            if [ -f "$f" ]; then
              sudo mysql es_extended < "$f" || true
            fi
          done

      - name: Write server.cfg
        env:
          CONNECT_ADDR: ${{ secrets.LOCALTONET_CONNECT }}
        run: |
          CONNECT_HOST="${CONNECT_ADDR%%:*}"
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_endpointPrivacy true
          sv_maxclients 8
          sv_hostname "Freeroam | Safe Spawn + Redzone"
          sets sv_projectName "Freeroam GHA"
          sets sv_projectDesc "ESX Legacy freeroam — green spawn, redzone PvP, shops"
          sets tags "freeroam, esx, pvp, redzone"
          sv_master1 ""
          set resources_useSystemChat true
          set onesync on
          sv_enforceGameBuild 3095
          setr esx:locale "en"
          setr inventory:framework "esx"
          set inventory:accounts ["money"]
          set mysql_connection_string "mysql://fivem:fivem@127.0.0.1/es_extended?charset=utf8mb4"
          ensure mapmanager
          ensure chat
          ensure spawnmanager
          ensure sessionmanager
          ensure hardcap
          ensure baseevents
          ensure oxmysql
          ensure ox_lib
          ensure es_extended
          ensure [core]
          ensure ox_inventory
          ensure lation_greenzones
          ensure sd-redzones
          ensure fr_hub
          add_principal group.admin group.user
          add_ace group.admin command allow
          add_ace group.admin command.quit deny
          add_ace resource.es_extended command.add_ace allow
          add_ace resource.es_extended command.add_principal allow
          add_ace resource.es_extended command.remove_principal allow
          add_ace resource.es_extended command.stop allow
          CFG
          sed -i 's/^[[:space:]]*//' server-data/server.cfg
          {
            echo "sv_licenseKey \"${{ secrets.SV_LICENSE_KEY }}\""
            echo "sv_listingHostOverride \"${CONNECT_HOST}\""
            echo "sv_listingIPOverride \"${CONNECT_ADDR}\""
          } >> server-data/server.cfg
          echo "=== server.cfg ==="
          cat server-data/server.cfg

      - name: Start FXServer (screen)
        run: |
          screen -dmS fivem bash -lc 'cd server-data && bash ../fxserver/run.sh +exec server.cfg 2>&1 | tee ../fivem.log'
          for i in $(seq 1 120); do
            sleep 3
            if curl -sf http://127.0.0.1:30120/info.json >/dev/null 2>&1; then
              echo "FXServer ready"
              curl -s http://127.0.0.1:30120/info.json | head -c 800
              echo
              grep -E 'Found [0-9]+ resources|Couldn.t find resource|Error|Started resource' fivem.log | head -n 60 || true
              exit 0
            fi
            if (( i % 10 == 0 )); then
              echo "wait $i"
              tail -n 25 fivem.log || true
            fi
          done
          echo "FXServer NOT ready"
          tail -n 120 fivem.log || true
          exit 1

      - name: Localtonet TCP+UDP tunnel
        id: tunnel
        env:
          LOCALTONET_AUTHTOKEN: ${{ secrets.LOCALTONET_AUTHTOKEN }}
          LOCALTONET_CONNECT: ${{ secrets.LOCALTONET_CONNECT }}
          LOCAL_PORT: "30120"
        run: |
          chmod +x scripts/localtonet-setup.sh scripts/localtonet-keepalive.sh
          scripts/localtonet-setup.sh
          test -s connect.txt
          echo "tunnel output connect=$(cat connect.txt)"

      - name: Verify local then public path
        env:
          CONNECT_ADDR: ${{ steps.tunnel.outputs.connect_address }}
        run: |
          echo "=== local info.json ==="
          curl -sv --max-time 10 http://127.0.0.1:30120/info.json 2>&1 | tail -n 30 || true
          echo "=== public http://$CONNECT_ADDR/info.json ==="
          curl -sv --max-time 15 "http://${CONNECT_ADDR}/info.json" 2>&1 | tail -n 50 || true
          echo "=== agent log ==="
          cat localtonet-agent.log || true
          echo "=== recent fivem errors ==="
          grep -iE 'error|fail|couldn' fivem.log | tail -n 40 || true

      - name: Print connect info
        run: |
          echo "############################################"
          echo "#  connect ${{ steps.tunnel.outputs.connect_address }}"
          echo "############################################"
          echo "${{ steps.tunnel.outputs.connect_address }}" > connect.txt
          echo "## Connect" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "connect ${{ steps.tunnel.outputs.connect_address }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See freeroam/SERVER_FEATURES.md for zones, shops, starter cash." >> $GITHUB_STEP_SUMMARY

      - name: Upload connect address
        uses: actions/upload-artifact@v4
        with:
          name: connect-address
          path: |
            connect.txt
            localtonet-agent.log
            fivem.log
            freeroam/SERVER_FEATURES.md
          retention-days: 1
          if-no-files-found: warn

      - name: Keep tunnel + server alive
        env:
          LOCALTONET_AUTHTOKEN: ${{ secrets.LOCALTONET_AUTHTOKEN }}
        run: |
          chmod +x scripts/localtonet-keepalive.sh
          scripts/localtonet-keepalive.sh
