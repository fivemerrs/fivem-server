name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          curl -L -o resources.zip "https://github.com/fivemerrs/fivem-server/releases/download/v2/resources.zip"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Config
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 8
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Start FXServer
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10

      - name: Playit tunnel
        id: tunnel
        run: |
          # Install playit (daemon auto-starts as root)
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y
          sleep 10

          echo "========== PLAYIT STATUS =========="
          systemctl status playit.service --no-pager -n 3 2>/dev/null || true
          echo ""

          if [ -n "${{ secrets.PLAYIT_SECRET }}" ]; then
            # Already have a secret - write config and restart
            echo "secret = \"${{ secrets.PLAYIT_SECRET }}\"" | sudo tee /etc/playit/playit.toml
            sudo systemctl restart playit.service
            sleep 15
            echo "=== Tunnel info ==="
            sudo cat /var/log/playit/playit.log 2>/dev/null | tail -20
          else
            # No secret - run setup to get claim URL
            # sudo + timeout handles permissions and non-interactive
            echo "=== Running playit setup (with sudo + 15s timeout) ==="
            sudo timeout 15 playit setup 2>&1 || true
            echo ""
            echo "=== Checking for claim URL in daemon log ==="
            sudo cat /var/log/playit/playit.log 2>/dev/null
            echo ""
            echo "=== Checking config ==="
            sudo cat /etc/playit/playit.toml 2>/dev/null || echo "no config yet"
          fi

          echo "========== DONE =========="
