name: Export license for local dev
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets to artifact
        env:
          KEY: ${{ secrets.SV_LICENSE_KEY }}
          ADMINS: ${{ secrets.ADMIN_IDENTIFIERS }}
        run: |
          printf '%s' "$KEY" > sv_license_key.txt
          printf '%s' "$ADMINS" > admin_identifiers.txt
      - uses: actions/upload-artifact@v4
        with:
          name: local-dev-secrets
          path: |
            sv_license_key.txt
            admin_identifiers.txt
          retention-days: 1